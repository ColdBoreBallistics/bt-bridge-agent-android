name: Release

# On pushing a v* tag, build the debug APK and create a GitHub Release with notes
# from CHANGELOG.md and the APK attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Validate the wrapper JAR explicitly, allow-listing this repo's verified
      # Gradle 8.13 wrapper sha (byte-identical across the ScopeDOPE app repos;
      # the action's built-in allowlist doesn't yet include this 8.13 wrapper).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
        with:
          allow-checksums: 591253e94d06160a931907cfb5e90338b166b6232062998020b0bec0fa8e69fb

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Wrapper validation is handled by the explicit step above (which
          # allow-lists our verified checksum); don't re-run it here.
          validate-wrappers: false

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Name the APK (version + short sha)
        id: apk
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          NAME="BT_Bridge_${VERSION}-${SHORT_SHA}_debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $VERSION" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.apk.outputs.name }}
