name: CI

# Builds the app and runs JVM unit tests on every push and pull request.

on:
  push:
    branches: [main, "b*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Validate the wrapper JAR explicitly, allow-listing this repo's verified
      # Gradle 8.13 wrapper sha (byte-identical across the ScopeDOPE app repos;
      # the action's built-in allowlist doesn't yet include this 8.13 wrapper).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          allow-checksums: 591253e94d06160a931907cfb5e90338b166b6232062998020b0bec0fa8e69fb

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Wrapper validation is handled by the explicit step above (which
          # allow-lists our verified checksum); don't re-run it here.
          validate-wrappers: false

      - name: Run JVM unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
